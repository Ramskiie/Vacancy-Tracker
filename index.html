<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TeleEye — Requisition Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1B2233;
    --paper:#EEEEE6;
    --paper-raised:#F7F6F0;
    --line:#C9C7B8;
    --mustard:#C68E17;
    --mustard-bg:#F3E3C3;
    --teal:#2A6F73;
    --teal-bg:#DCEBEA;
    --forest:#3D6B47;
    --forest-bg:#DEE9DD;
    --brick:#8C3B3B;
    --brick-bg:#EFDCDA;
    --muted:#6B6A5E;
    --shadow: 0 1px 0 rgba(27,34,51,0.05), 0 4px 10px rgba(27,34,51,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--mustard-bg); }

  /* ===== Masthead ===== */
  .masthead{
    background:var(--ink);
    color:var(--paper-raised);
    padding:28px 32px 22px;
    position:relative;
    overflow:hidden;
  }
  .masthead::after{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 40px);
    pointer-events:none;
  }
  .masthead-top{
    display:flex; justify-content:space-between; align-items:flex-end;
    position:relative;
  }
  .masthead h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:34px;
    letter-spacing:0.3px;
    margin:0;
  }
  .masthead .kicker{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:#B8B6A8;
    margin-bottom:6px;
  }
  .masthead .date{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:#B8B6A8;
    text-align:right;
  }
  .stats-row{
    display:flex; gap:0;
    margin-top:22px;
    border-top:1px solid rgba(255,255,255,0.14);
    position:relative;
  }
  .stat{
    flex:1;
    padding:14px 18px 0;
    border-right:1px solid rgba(255,255,255,0.14);
  }
  .stat:last-child{ border-right:none; }
  .stat .num{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    line-height:1;
  }
  .stat .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#9C9A8C;
    margin-top:5px;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    padding:18px 32px;
    border-bottom:1px solid var(--line);
    background:var(--paper-raised);
  }
  .toolbar input[type="text"], .toolbar select{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  .toolbar input[type="text"]{ min-width:200px; flex:1; }
  .spacer{ flex:1; }
  .btn{
    font-family:'IBM Plex Sans',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:9px 18px;
    border-radius:3px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper-raised);
    cursor:pointer;
    transition:transform 0.1s ease, box-shadow 0.1s ease;
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:var(--shadow); }
  .btn.ghost{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
    font-weight:500;
  }

  /* ===== Ledger list ===== */
  .ledger{
    padding:24px 32px 60px;
    max-width:1100px;
    margin:0 auto;
  }
  .group-heading{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin:28px 0 10px;
    display:flex; align-items:center; gap:10px;
  }
  .group-heading::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'Fraunces',serif;
    font-size:18px;
  }
  .empty .sub{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
    margin-top:8px;
  }

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:4px;
    padding:16px 18px;
    margin-bottom:10px;
    display:grid;
    grid-template-columns:90px 1.6fr 1fr 0.9fr 0.8fr 0.7fr auto;
    align-items:center;
    gap:14px 14px;
    box-shadow:var(--shadow);
    position:relative;
    animation:settle 0.25s ease;
  }
  @keyframes settle{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .req-id{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted);
    font-weight:500;
  }
  .role-cell .title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:17px;
  }
  .role-cell .dept{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .cell-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin-bottom:2px;
  }
  .cell-value{ font-size:13.5px; }
  .status-pill{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:500;
    padding:5px 10px 5px 11px;
    border-radius:2px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    transform:rotate(-1deg);
    border:1px solid transparent;
  }
  .status-open{ background:var(--mustard-bg); color:var(--mustard); border-color:var(--mustard); }
  .status-interviewing{ background:var(--teal-bg); color:var(--teal); border-color:var(--teal); }
  .status-offer{ background:var(--forest-bg); color:var(--forest); border-color:var(--forest); }
  .status-onhold{ background:var(--brick-bg); color:var(--brick); border-color:var(--brick); }
  .status-filled{ background:#DDE2E8; color:#3D4C5E; border-color:#3D4C5E; }
  .priority-flag{
    font-size:11px;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
  }
  .priority-high{ color:var(--brick); }
  .priority-medium{ color:var(--mustard); }
  .priority-low{ color:var(--muted); }
  .actions{ display:flex; gap:6px; }
  .icon-btn{
    background:none; border:none; cursor:pointer;
    color:var(--muted);
    font-size:13px;
    padding:4px 6px;
    border-radius:3px;
    font-family:'IBM Plex Sans',sans-serif;
  }
  .icon-btn:hover{ background:var(--paper); color:var(--ink); }
  .days-open{ font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .days-open.stale{ color:var(--brick); font-weight:600; }

  /* ===== Applicants (card view) ===== */
  .applicants-row{
    grid-column:1 / -1;
    border-top:1px dashed var(--line);
    margin-top:2px;
    padding-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    align-items:center;
  }
  .applicants-row .cell-label{ margin-bottom:0; margin-right:2px; }
  .applicant-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    padding:4px 9px 4px 10px;
    border-radius:20px;
    background:var(--paper);
    border:1px solid var(--line);
  }
  .applicant-chip .a-name{ font-weight:500; }
  .applicant-chip .a-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:2px 6px;
    border-radius:10px;
  }
  .astatus-applied{ background:#E4E2D6; color:#6B6A5E; }
  .astatus-screening{ background:var(--mustard-bg); color:var(--mustard); }
  .astatus-interviewing{ background:var(--teal-bg); color:var(--teal); }
  .astatus-offer{ background:var(--forest-bg); color:var(--forest); }
  .astatus-hired{ background:#DDE2E8; color:#3D4C5E; }
  .astatus-rejected{ background:var(--brick-bg); color:var(--brick); }
  .no-applicants{
    grid-column:1 / -1;
    border-top:1px dashed var(--line);
    margin-top:2px;
    padding-top:10px;
    font-size:12px;
    color:var(--muted);
    font-style:italic;
  }

  /* ===== Applicants (modal form) ===== */
  .applicant-row{
    display:grid;
    grid-template-columns:1fr 130px auto;
    gap:8px;
    margin-bottom:8px;
    align-items:center;
  }
  .applicant-row input, .applicant-row select{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  .remove-applicant{
    background:none; border:none; cursor:pointer;
    color:var(--muted);
    font-size:15px;
    padding:4px 8px;
  }
  .remove-applicant:hover{ color:var(--brick); }
  .add-applicant-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    background:none;
    border:1px dashed var(--line);
    border-radius:3px;
    padding:7px 12px;
    color:var(--muted);
    cursor:pointer;
    width:100%;
    margin-top:2px;
  }
  .add-applicant-btn:hover{ border-color:var(--ink); color:var(--ink); }
  .no-applicants-note{
    font-size:12px;
    color:var(--muted);
    font-style:italic;
    margin-bottom:8px;
  }

  /* ===== Modal ===== */
  .overlay{
    position:fixed; inset:0;
    background:rgba(27,34,51,0.45);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--paper-raised);
    width:100%; max-width:520px;
    max-height:90vh;
    overflow-y:auto;
    border-radius:5px;
    padding:26px 28px 22px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    position:relative;
  }
  .modal h2{
    font-family:'Fraunces',serif;
    font-size:22px;
    margin:0 0 4px;
  }
  .modal .modal-sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    margin-bottom:5px;
    color:var(--ink);
  }
  .field input, .field select, .field textarea{
    width:100%;
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13.5px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions{
    display:flex; justify-content:flex-end; gap:10px;
    margin-top:20px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .close-x{
    position:absolute; top:18px; right:20px;
    background:none; border:none; cursor:pointer;
    font-size:18px; color:var(--muted);
  }

  @media (max-width:800px){
    .card{
      grid-template-columns:1fr 1fr;
      grid-template-areas:
        "id id"
        "role role"
        "dept dept"
        "status priority"
        "days actions";
    }
    .field-row{ grid-template-columns:1fr; }
    .stats-row{ flex-wrap:wrap; }
    .stat{ min-width:45%; border-right:none; margin-bottom:8px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-top">
    <div>
      <div class="kicker">TeleEye · Recruitment · Requisition Ledger</div>
      <h1>Open Vacancies</h1>
    </div>
    <div class="date" id="todayDate"></div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="Search by role or hiring manager…">
  <select id="statusFilter">
    <option value="">All statuses</option>
    <option value="open">Open</option>
    <option value="interviewing">Interviewing</option>
    <option value="offer">Offer out</option>
    <option value="onhold">On hold</option>
    <option value="filled">Filled</option>
  </select>
  <select id="deptFilter">
    <option value="">All departments</option>
  </select>
  <div class="spacer"></div>
  <button class="btn ghost" id="clearFilters">Clear filters</button>
  <button class="btn" id="newReqBtn">+ New requisition</button>
</div>

<div class="ledger" id="ledger"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-x" id="closeModal">✕</button>
    <h2 id="modalTitle">New requisition</h2>
    <div class="modal-sub" id="modalSub">Fill in the details below</div>
    <form id="reqForm">
      <div class="field">
        <label>Role title</label>
        <input type="text" id="f_title" required placeholder="e.g. Senior Backend Engineer">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Department</label>
          <input type="text" id="f_dept" required placeholder="e.g. Engineering">
        </div>
        <div class="field">
          <label>Hiring manager</label>
          <input type="text" id="f_manager" placeholder="e.g. J. Alvarez">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Status</label>
          <select id="f_status">
            <option value="open">Open</option>
            <option value="interviewing">Interviewing</option>
            <option value="offer">Offer out</option>
            <option value="onhold">On hold</option>
            <option value="filled">Filled</option>
          </select>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="f_priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Positions open</label>
          <input type="number" id="f_positions" min="1" value="1">
        </div>
        <div class="field">
          <label>Date opened</label>
          <input type="date" id="f_dateOpened">
        </div>
      </div>
      <div class="field">
        <label>Applicants</label>
        <div id="applicantsList"></div>
        <div class="no-applicants-note" id="noApplicantsNote" style="display:none;">No applicants added yet.</div>
        <button type="button" class="add-applicant-btn" id="addApplicantBtn">+ Add applicant</button>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f_notes" placeholder="Requirements, budget, sourcing channel…"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn" id="saveBtn">Save requisition</button>
      </div>
    </form>
  </div>
</div>

<script>
// ===== Firebase setup =====
// Fill these in with your own Firebase project's web app config
// (Firebase console -> Project settings -> General -> Your apps -> SDK setup and config).
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const trackerDoc = db.collection('vacancyTracker').doc('main');

let vacancies = [];
let editingId = null;
let nextSeq = 1;

const statusMeta = {
  open:        { label:'Open',          cls:'status-open' },
  interviewing:{ label:'Interviewing',  cls:'status-interviewing' },
  offer:       { label:'Offer out',     cls:'status-offer' },
  onhold:      { label:'On hold',       cls:'status-onhold' },
  filled:      { label:'Filled',        cls:'status-filled' }
};
const groupOrder = ['open','interviewing','offer','onhold','filled'];

const applicantStatusMeta = {
  applied:      { label:'Applied',       cls:'astatus-applied' },
  screening:    { label:'Screening',     cls:'astatus-screening' },
  interviewing: { label:'Interviewing',  cls:'astatus-interviewing' },
  offer:        { label:'Offer',         cls:'astatus-offer' },
  hired:        { label:'Hired',         cls:'astatus-hired' },
  rejected:     { label:'Rejected',      cls:'astatus-rejected' }
};
let modalApplicants = [];

function fmtDate(d){
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function daysBetween(a,b){
  return Math.floor((b - a) / (1000*60*60*24));
}
function reqIdFor(seq){
  return 'REQ-' + String(seq).padStart(3,'0');
}

function loadData(){
  // Live-listens to the shared Firestore document, so any device that
  // adds/edits/deletes a requisition updates every other open tab automatically.
  trackerDoc.onSnapshot((doc) => {
    if(doc.exists){
      const data = doc.data();
      vacancies = data.vacancies || [];
      nextSeq = data.nextSeq || (vacancies.length + 1);
    } else {
      vacancies = [];
      nextSeq = 1;
    }
    render();
  }, (err) => {
    console.error('Could not load from Firestore', err);
    vacancies = [];
    nextSeq = 1;
    render();
  });
}

async function saveData(){
  try{
    await trackerDoc.set({ vacancies, nextSeq });
  }catch(e){
    console.error('Could not save', e);
    alert('Could not save to the cloud. Check your Firebase config and internet connection, then try again.');
  }
}

function openModal(vacancy){
  editingId = vacancy ? vacancy.id : null;
  document.getElementById('modalTitle').textContent = vacancy ? 'Edit requisition' : 'New requisition';
  document.getElementById('modalSub').textContent = vacancy ? reqIdFor(vacancy.seq) : 'Will be assigned ' + reqIdFor(nextSeq);
  document.getElementById('f_title').value = vacancy ? vacancy.title : '';
  document.getElementById('f_dept').value = vacancy ? vacancy.dept : '';
  document.getElementById('f_manager').value = vacancy ? vacancy.manager : '';
  document.getElementById('f_status').value = vacancy ? vacancy.status : 'open';
  document.getElementById('f_priority').value = vacancy ? vacancy.priority : 'medium';
  document.getElementById('f_positions').value = vacancy ? vacancy.positions : 1;
  document.getElementById('f_dateOpened').value = vacancy ? vacancy.dateOpened : new Date().toISOString().slice(0,10);
  document.getElementById('f_notes').value = vacancy ? (vacancy.notes || '') : '';
  modalApplicants = vacancy && vacancy.applicants ? JSON.parse(JSON.stringify(vacancy.applicants)) : [];
  renderApplicantRows();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('f_title').focus();
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
  modalApplicants = [];
}

function renderApplicantRows(){
  const container = document.getElementById('applicantsList');
  const note = document.getElementById('noApplicantsNote');
  note.style.display = modalApplicants.length === 0 ? 'block' : 'none';
  container.innerHTML = modalApplicants.map((a, i) => `
    <div class="applicant-row">
      <input type="text" placeholder="Applicant name" value="${escapeHtml(a.name)}" oninput="updateApplicantField(${i}, 'name', this.value)">
      <select onchange="updateApplicantField(${i}, 'status', this.value)">
        ${Object.entries(applicantStatusMeta).map(([key, meta]) => `<option value="${key}" ${a.status === key ? 'selected' : ''}>${meta.label}</option>`).join('')}
      </select>
      <button type="button" class="remove-applicant" onclick="removeApplicantRow(${i})">✕</button>
    </div>
  `).join('');
}
function updateApplicantField(index, field, value){
  if(modalApplicants[index]) modalApplicants[index][field] = value;
}
function addApplicantRow(){
  modalApplicants.push({ name:'', status:'applied' });
  renderApplicantRows();
  const inputs = document.querySelectorAll('#applicantsList .applicant-row input');
  if(inputs.length) inputs[inputs.length - 1].focus();
}
function removeApplicantRow(index){
  modalApplicants.splice(index, 1);
  renderApplicantRows();
}
document.getElementById('addApplicantBtn').addEventListener('click', addApplicantRow);

document.getElementById('newReqBtn').addEventListener('click', () => openModal(null));
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });

document.getElementById('reqForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    title: document.getElementById('f_title').value.trim(),
    dept: document.getElementById('f_dept').value.trim(),
    manager: document.getElementById('f_manager').value.trim(),
    status: document.getElementById('f_status').value,
    priority: document.getElementById('f_priority').value,
    positions: parseInt(document.getElementById('f_positions').value) || 1,
    dateOpened: document.getElementById('f_dateOpened').value,
    notes: document.getElementById('f_notes').value.trim(),
    applicants: modalApplicants
      .map(a => ({ name: a.name.trim(), status: a.status || 'applied' }))
      .filter(a => a.name)
  };
  if(editingId){
    const existing = vacancies.find(v => v.id === editingId);
    Object.assign(existing, data);
  } else {
    vacancies.push(Object.assign({ id: 'v' + Date.now(), seq: nextSeq }, data));
    nextSeq += 1;
  }
  await saveData();
  closeModal();
  render();
});

async function deleteVacancy(id){
  vacancies = vacancies.filter(v => v.id !== id);
  await saveData();
  render();
}

function populateDeptFilter(){
  const sel = document.getElementById('deptFilter');
  const current = sel.value;
  const depts = [...new Set(vacancies.map(v => v.dept).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All departments</option>' + depts.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
  sel.value = current;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderStats(){
  const openLike = vacancies.filter(v => v.status !== 'filled');
  const totalPositions = openLike.reduce((s,v) => s + (v.positions||0), 0);
  const totalPipeline = openLike.reduce((s,v) => s + ((v.applicants||[]).length), 0);
  const today = new Date();
  const avgDays = openLike.length
    ? Math.round(openLike.reduce((s,v) => s + daysBetween(new Date(v.dateOpened||today), today), 0) / openLike.length)
    : 0;
  const highPriority = openLike.filter(v => v.priority === 'high').length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="num">${openLike.length}</div><div class="label">Active requisitions</div></div>
    <div class="stat"><div class="num">${totalPositions}</div><div class="label">Positions to fill</div></div>
    <div class="stat"><div class="num">${totalPipeline}</div><div class="label">Candidates in pipeline</div></div>
    <div class="stat"><div class="num">${avgDays}</div><div class="label">Avg. days open</div></div>
    <div class="stat"><div class="num">${highPriority}</div><div class="label">High priority</div></div>
  `;
}

function render(){
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  populateDeptFilter();
  renderStats();

  const search = document.getElementById('searchBox').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const deptFilter = document.getElementById('deptFilter').value;

  let filtered = vacancies.filter(v => {
    const matchesSearch = !search || v.title.toLowerCase().includes(search) || (v.manager||'').toLowerCase().includes(search);
    const matchesStatus = !statusFilter || v.status === statusFilter;
    const matchesDept = !deptFilter || v.dept === deptFilter;
    return matchesSearch && matchesStatus && matchesDept;
  });

  const ledger = document.getElementById('ledger');

  if(vacancies.length === 0){
    ledger.innerHTML = `<div class="empty">No requisitions on the ledger yet<div class="sub">Open a new one to start tracking a vacancy.</div></div>`;
    return;
  }
  if(filtered.length === 0){
    ledger.innerHTML = `<div class="empty">Nothing matches those filters<div class="sub">Try clearing the search or filters above.</div></div>`;
    return;
  }

  let html = '';
  const today = new Date();

  groupOrder.forEach(statusKey => {
    const group = filtered.filter(v => v.status === statusKey).sort((a,b) => new Date(a.dateOpened) - new Date(b.dateOpened));
    if(group.length === 0) return;
    html += `<div class="group-heading">${statusMeta[statusKey].label} · ${group.length}</div>`;
    group.forEach(v => {
      const opened = v.dateOpened ? new Date(v.dateOpened) : today;
      const days = daysBetween(opened, today);
      const stale = days > 45 && v.status !== 'filled';
      html += `
        <div class="card">
          <div class="req-id">${reqIdFor(v.seq)}</div>
          <div class="role-cell">
            <div class="title">${escapeHtml(v.title)}</div>
            <div class="dept">${escapeHtml(v.dept)}${v.manager ? ' · ' + escapeHtml(v.manager) : ''}</div>
          </div>
          <div>
            <span class="cell-label">Status</span>
            <span class="status-pill ${statusMeta[v.status].cls}">${statusMeta[v.status].label}</span>
          </div>
          <div>
            <span class="cell-label">Positions / Pipeline</span>
            <span class="cell-value">${v.positions} open · ${(v.applicants||[]).length} candidates</span>
          </div>
          <div>
            <span class="cell-label">Priority</span>
            <span class="priority-flag priority-${v.priority}">${v.priority.toUpperCase()}</span>
          </div>
          <div>
            <span class="cell-label">Days open</span>
            <span class="days-open ${stale ? 'stale' : ''}">${days}d</span>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="editVacancy('${v.id}')">Edit</button>
            <button class="icon-btn" onclick="confirmDelete('${v.id}')">Delete</button>
          </div>
          ${(v.applicants && v.applicants.length) ? `
          <div class="applicants-row">
            <span class="cell-label">Applicants</span>
            ${v.applicants.map(a => `
              <span class="applicant-chip">
                <span class="a-name">${escapeHtml(a.name)}</span>
                <span class="a-status ${applicantStatusMeta[a.status] ? applicantStatusMeta[a.status].cls : 'astatus-applied'}">${applicantStatusMeta[a.status] ? applicantStatusMeta[a.status].label : a.status}</span>
              </span>
            `).join('')}
          </div>
          ` : `<div class="no-applicants">No applicants yet</div>`}
        </div>
      `;
    });
  });

  ledger.innerHTML = html;
}

function editVacancy(id){
  const v = vacancies.find(v => v.id === id);
  if(v) openModal(v);
}
function confirmDelete(id){
  const v = vacancies.find(v => v.id === id);
  if(v && confirm(`Remove ${reqIdFor(v.seq)} — ${v.title} from the ledger?`)){
    deleteVacancy(id);
  }
}

document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('deptFilter').addEventListener('change', render);
document.getElementById('clearFilters').addEventListener('click', () => {
  document.getElementById('searchBox').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('deptFilter').value = '';
  render();
});

loadData();
</script>
</body>
</html>
